<!DOCTYPE html>
<html>

  <head>
    <title>ResMap</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/tab_icon.png" />

    <!----------- CSS  ----------->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.4.3/css/ol.css" type="text/css">
    <link rel="stylesheet" href="./css/style.css">
  </head>


  <body>
    <!--
    <main class="" role="main">
      <div id="map"><div id="popup"></div>
    </main>-->

    <div class="container-fluid">
      <div class="row">

        <!-- Partie gauche : MENU & PARAMETRES -->
        <div class="col-3" id="param">

          <!-- Image logo -->
          <div class="logo-header">
            <img id="logo" src="./img/ResMap_logo.svg" alt="Logo de ResMap">
          </div>

          <!-- Box pour importer le fichier .PRNx -->
          <div class="mt-2 greyBackground border border-dark p-1">
            <h5 class="mx-2">Import du fichier .PRNx</h5>
            <input class="mx-2 my-1 pr-2 inputFile" type="file" id="inputfile" accept=".prnx"></input>
            <p class="mx-2 my-1 importInfo" id="outputTest"> </p>
          </div>

          <!-- Points -->
          <button class="accordion mt-2 py-1" id="coucheButton">
            Points
          </button>
          
          <div class="panel scoller">
            <div>
              <input class="form-check-input" type="checkbox" id="checkboxPointsFixes" onchange="changeLayerVisibilityFixedPoints_planimetric()" checked>
              <label class="checkboxLabel" for="checkboxPointsFixes">
                Points fixes
              </label>
            </div>
            <div class="NoPtsDecalage">
              <input class="form-check-input NoPtsCheckbox" type="checkbox" id="checkboxPointsFixesNo" onchange="changeLayerVisibilityTextFixedPoints_planimetric()" checked>
              <label class="checkboxLabel NoPtsTxt" for="checkboxPointsFixesNo">
                N° points fixes
              </label>
            </div>

            <div>
              <input class="form-check-input" type="checkbox" id="checkboxPointsNouv" onchange="changeLayerVisibilityVariablePoints_planimetric()" checked>
              <label class="checkboxLabel" for="checkboxPointsNouv">
                Points nouveaux
              </label>
            </div>
            <div class="NoPtsDecalage">
              <input class="form-check-input NoPtsCheckbox" type="checkbox" id="checkboxPointsVariableNo" onchange="changeLayerVisibilityTextVariablePoints_planimetric()" checked>
              <label class="checkboxLabel NoPtsTxt" for="checkboxPointsVariableNo">
                N° points nouveaux
              </label>
            </div>
          </div>

          <!-- Abriss planimétrique -->
          <button class ="accordion mt-2 py-1" id="coucheButton">Planimétrie</button>
          <div class="panel scroller">
            <!-- Menu : Observations terrestres -->
            <div class="mt-2">
              <button class="accordion py-1">Observations terrestres</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxDirections" onchange="changeLayerVisibilityDirections_planimetric()" checked>
                  <label class="checkboxLabel" for="checkboxDirections" id="legendeDir">
                    Directions
                  </label>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxDistances" onchange="changeLayerVisibilityDistances_planimetric()" checked>
                  <label class="checkboxLabel" for="checkboxDistances" id="legendeDist">
                    Distances
                  </label>
                </div>
              </div>
            </div>

            <!-- Menu : Observations des coordonnées -->
            <div class="mt-2">
              <button class="accordion py-1">Observations de coordonnées</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxCoordE" onchange="changeLayerVisibilityCoordE_planimetric()" >
                  <label class="checkboxLabel" for="checkboxCoordE">
                    E / Y
                  </label>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxCoordN" onchange="changeLayerVisibilityCoordN_planimetric()" >
                  <label class="checkboxLabel" for="checkboxCoordN">
                    N / X
                  </label>
                </div>
              </div>
            </div>

            <!-- Menu : Session GNSS -->
            <div class="mt-2">
              <button class="accordion py-1" clicked>Sessions GNSS</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxGnss" onchange="changeLayerVisibilityGnss_planimetric()">
                  <label class="checkboxLabel" for="checkboxGnss">
                    Session 1,2,3, etc.
                  </label>
                </div>
              </div>
            </div>

            <!-- Menu : Indicateurs de précisions -->
            <div class="mt-2">
              <button class="accordion py-1">Indicateurs de précisions</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxEllipses" onchange="changeLayerVisibilityEllipses_planimetric()">
                  <label class="checkboxLabel" for="checkboxEllipses">
                    Ellipses de confiance
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleEllipse">⤷ Echelle: </div>
                  </div>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxEllipsesRela" onchange="changeLayerVisibilityEllipsesRela_planimetric()">
                  <label class="checkboxLabel" for="checkboxEllipsesRela" id="legendeEllRela">
                    Ellipses de confiance relatives
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleEllipseRela">⤷ Echelle: </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Menu : Indicateurs de fiabilité -->
            <div class="mt-2">
              <button class="accordion py-1" clicked>Indicateurs de fiabilité</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxRectangles" onchange="changeLayerVisibilityRectangles_planimetric()">
                  <label class="checkboxLabel" for="checkboxRectangles">
                    Rectangles de fiabilité externe
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleRectangles">⤷ Echelle: </div>
                  </div>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxRectanglesRela" onchange="changeLayerVisibilityRectanglesRela_planimetric()">
                  <label class="checkboxLabel" for="checkboxRectanglesRela" id="legendeRectRela">
                    Rectangles de fiab. ext. relatifs
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleRectanglesRela">⤷ Echelle: </div>
                  </div>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxFiabLoc" onchange="changeLayerVisibilityFiabLoc_planimetric()">
                  <label class="checkboxLabel" for="checkboxFiabLoc">
                    Carte des fiabilités locales (zi)
                  </label>
                  <div>
                    <div class="textEchelleLegende fontColorFiab1">――  0 - 25 %</div>
                    <div class="textEchelleLegende fontColorFiab2">――  25 - 50 %</div>
                    <div class="textEchelleLegende fontColorFiab3">――  50 - 75 %</div>
                    <div class="textEchelleLegende fontColorFiab4">――  75 - 100 %</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Menu : Résidus normés -->
            <div class="mt-2">
              <button class="accordion py-1">Résidus normés</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxResidusNormes" onchange="changeLayerVisibilityWi_planimetric()">
                  <label class="checkboxLabel" for="checkboxResidusNormes" id="legendeWi">
                    Carte des résidus normés (wi)
                  </label>
                  <div>
                    <div class="textEchelleLegende fontColorFiab1" id="palierWi1">――  x - ∞</div>
                    <div class="textEchelleLegende fontColorFiab2" id="palierWi2">――  x - x</div>
                    <div class="textEchelleLegende fontColorFiab4" id="palierWi3">――  0.0 - x</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Menu : Différences avec les coordonnées initiales -->
            <div class="mt-2">
              <button class="accordion py-1">Diff. avec coordonnées initiales</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxVect" onchange="changeLayerVisibilityVect_planimetric()">
                  <label class="checkboxLabel" for="checkboxVect">
                    Vecteurs DY/DX
                  </label>
                </div>
                <div>
                  <div class="textEchelleLegende" id="AffichageEchelleVect">⤷ Echelle: </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Abriss altimétrique -->
          <button class ="accordion mt-2 py-1" id="coucheButton">Altimétrie</button>
          <div class="panel scroller">

            <!-- Menu : Observations terrestres -->
            <div class="mt-2">
              <button class="accordion py-1">Observations terrestres</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxDenivelee" onchange="changeLayerVisibilityDenivelee_altimetric()">
                  <label class="checkboxLabel" for="checkboxDenivelee">
                    Dénivelée
                  </label>
                </div>
              </div>
            </div>

            <!-- Menu : Observations des coordonnées -->
            <div class="mt-2">
              <button class="accordion py-1">Observations de coordonnées</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxCoordH" onchange="">
                  <label class="checkboxLabel" for="checkboxCoordH">
                    H
                  </label>
                </div>
              </div>
            </div>

            <!-- Menu : Session GNSS -->
            <div class="mt-2">
              <button class="accordion py-1" clicked>Sessions GNSS</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxGnss_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxGnss_altimetric">
                    Session 1,2,3, etc.
                  </label>
                </div>
              </div>
            </div>

            <!-- Menu : Indicateurs de précisions -->
            <div class="mt-2">
              <button class="accordion py-1">Indicateurs de précisions</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxEllipses_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxEllipses_altimetric">
                    Ellipses de confiance
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleEllipse_altimetric">⤷ Echelle: </div>
                  </div>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxEllipsesRela_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxEllipsesRela_altimetric" id="legendeEllRela_altimetric">
                    Ellipses de confiance relatives
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleEllipseRela_altimetric">⤷ Echelle: </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Menu : Indicateurs de fiabilité -->
            <div class="mt-2">
              <button class="accordion py-1" clicked>Indicateurs de fiabilité</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxRectangles_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxRectangles_altimetric">
                    Rectangles de fiabilité externe
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleRectangles_altimetric">⤷ Echelle: </div>
                  </div>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxRectanglesRela_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxRectanglesRela_altimetric" id="legendeRectRela_altimetric">
                    Rectangles de fiab. ext. relatifs
                  </label>
                  <div>
                    <div class="textEchelleLegende" id="AffichageEchelleRectanglesRela_altimetric">⤷ Echelle: </div>
                  </div>
                </div>
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxFiabLoc_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxFiabLoc_altimetric">
                    Carte des fiabilités locales (zi)
                  </label>
                  <div>
                    <div class="textEchelleLegende fontColorFiab1">――  0 - 25 %</div>
                    <div class="textEchelleLegende fontColorFiab2">――  25 - 50 %</div>
                    <div class="textEchelleLegende fontColorFiab3">――  50 - 75 %</div>
                    <div class="textEchelleLegende fontColorFiab4">――  75 - 100 %</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Menu : Résidus normés -->
            <div class="mt-2">
              <button class="accordion py-1">Résidus normés</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxResidusNormes_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxResidusNormes_altimetric" id="legendeWi_altimetric">
                    Carte des résidus normés (wi)
                  </label>
                  <div>
                    <div class="textEchelleLegende fontColorFiab1" id="palierWi1">――  x - ∞</div>
                    <div class="textEchelleLegende fontColorFiab2" id="palierWi2">――  x - x</div>
                    <div class="textEchelleLegende fontColorFiab4" id="palierWi3">――  0.0 - x</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Menu : Différences avec les coordonnées initiales -->
            <div class="mt-2">
              <button class="accordion py-1">Diff. avec coordonnées initiales</button>
              <div class="panel">
                <div>
                  <input class="form-check-input" type="checkbox" id="checkboxVect_altimetric" onchange="">
                  <label class="checkboxLabel" for="checkboxVect_altimetric">
                    Vecteurs DH
                  </label>
                </div>
                <div>
                  <div class="textEchelleLegende" id="AffichageEchelleVect_altimetric">⤷ Echelle: </div>
                </div>
              </div>
            </div>

          </div>
        </div>        

        <!-- Partie droite : CARTE -->
        <div class="col">
          <div id="map"></div>
        </div>
      </div>
    </div>





    <!------ DEBUT DES SCRIPTS ------>

    <!-- Librairie : JQuery / Bootstrap / proj4 -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.6.2/proj4.js" integrity="sha512-cgJnZ1VX2G0MAN4C5OGShwI3zHhfQ6RLriXuukhblNu+T082/ZRGoWLP/0xMKObvB6AUKdnm27hQKj8hKZPjXA==" crossorigin="anonymous"></script>
    <script src="./js/OpenLayers_v6.4.3.js"></script>
    
    <!-- Script personnel -->
    <script src="./js/MapInitialisation.js"></script>
    <script src="./js/ChangeBackground.js"></script>
    <script src="./js/slidingScale.js"></script>
    <script src="./js/accordionMenu.js"></script>

    <script src="./js/ParsingPointsXML.js"></script>
    <script src="./js/CenterViewOnProject.js"></script>
    
    <script src="./js/planimetricAbriss.js"></script>
    <script src="./js/planimetricAbrissChangeLayers.js"></script>

    <script src="./js/altimetricAbriss.js"></script>
    <script src="./js/altimetricAbrissChangeLayers.js"></script>

    

    <script src="./js/PopUpCoords.js"></script>
    <script src="./js/Export.js"></script>

    <script src="./js/main.js"></script>

  </body>
</html>
